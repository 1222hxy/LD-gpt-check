<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>中转站归一管理 - LD-gpt-check</title>
    <style>
      :root{color-scheme:light;--bg:#f7fbff;--text:#0f172a;--muted:#64748b;--line:#dbeafe;--brand:#2563eb;--cyan:#0891b2;--green:#047857;--red:#be123c;--amber:#b45309}
      *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:linear-gradient(135deg,rgba(37,99,235,.08),transparent 34%),linear-gradient(225deg,rgba(8,145,178,.12),transparent 38%),var(--bg);line-height:1.5;padding:18px}
      main{width:min(100%,1440px);margin:0 auto}nav,.hero,.panel,.card,.drawer{border:1px solid rgba(191,219,254,.95);background:rgba(255,255,255,.95);box-shadow:0 16px 48px rgba(37,99,235,.1);backdrop-filter:blur(16px);border-radius:10px}
      nav{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px;padding:10px 12px}.brand{font-weight:800;color:#1d4ed8;text-decoration:none}.nav-links{display:flex;gap:14px;flex-wrap:wrap}.nav-links a{color:#334155;text-decoration:none;font-size:14px}
      .hero{padding:18px;margin-bottom:14px}.hero-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}.badge,.pill{display:inline-flex;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:750}.badge{margin-bottom:10px;border:1px solid #bfdbfe;color:#1d4ed8;background:#eff6ff;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.pill{background:#eff6ff;color:#1d4ed8}.pill.green{background:#ecfdf5;color:var(--green)}.pill.amber{background:#fffbeb;color:var(--amber)}.pill.red{background:#fff1f2;color:var(--red)}
      h1{margin:0;font-size:30px;line-height:1.12;letter-spacing:0}h2{margin:0;font-size:18px}h3{margin:0;font-size:15px}p{margin:8px 0 0;color:var(--muted)}a{color:#1d4ed8}code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:#1d4ed8;overflow-wrap:anywhere}
      .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:16px}.stat{border:1px solid #dbeafe;border-radius:8px;background:#f8fafc;padding:12px}.stat span,.stat small{display:block;color:var(--muted);font-size:12px;font-weight:700}.stat strong{display:block;margin-top:4px;font-size:22px}
      .board{display:grid;grid-template-columns:360px minmax(0,1fr);gap:14px}.panel{padding:14px}.toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:10px}.toolbar input{max-width:320px}
      input,textarea,select{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:9px 11px;font:600 14px system-ui,sans-serif;background:#fff}textarea{min-height:130px;font:13px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;resize:vertical}input:focus,textarea:focus,select:focus{outline:3px solid rgba(37,99,235,.16);border-color:var(--brand)}
      button,.button{appearance:none;border:1px solid var(--brand);border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--cyan));color:#fff;min-height:36px;padding:7px 11px;font:750 13px system-ui,sans-serif;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}.secondary{border-color:#cbd5e1;background:#fff;color:#334155}.ghost{border-color:#bfdbfe;background:#eff6ff;color:#1d4ed8}.danger{border-color:#fecdd3;background:#fff1f2;color:var(--red)}.icon-button{width:32px;min-height:32px;padding:0}.button-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
      .list{display:grid;gap:10px}.card{padding:12px;box-shadow:none}.card header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.card.is-drop-target{outline:3px solid rgba(37,99,235,.2);border-color:#2563eb}.card.is-dragging{opacity:.65}.title{display:flex;align-items:center;gap:10px;min-width:0}.icon{width:34px;height:34px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;object-fit:contain;flex:0 0 auto}.icon-fallback{display:grid;place-items:center;color:#1d4ed8;font-weight:800;background:#eff6ff}.meta{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;color:#64748b;font-size:13px}.empty{border:1px dashed #bfdbfe;border-radius:8px;padding:16px;background:#f8fafc;color:var(--muted)}
      .bridge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}.drop-hint{margin-top:10px;border:1px dashed #bfdbfe;border-radius:8px;background:#f8fafc;padding:9px;color:#64748b;font-size:13px}.url-preview{margin-top:10px;display:grid;gap:5px}.url-preview div,.alias-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center;border:1px solid #e2e8f0;border-radius:7px;background:#fff;padding:7px 9px}.alias-row.sortable-ghost{opacity:.45}.drag-handle{cursor:grab;color:#64748b;font-weight:900}
      .drawer-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.2);display:none;z-index:20}.drawer-backdrop.is-open{display:block}.drawer{position:fixed;right:16px;top:16px;bottom:16px;width:min(520px,calc(100vw - 32px));padding:16px;overflow:auto;z-index:21;transform:translateX(calc(100% + 24px));transition:transform .18s ease}.drawer.is-open{transform:translateX(0)}.drawer-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}.field{display:grid;gap:5px;margin-top:12px}.field span{font-size:12px;color:#64748b;text-transform:uppercase;font-weight:800}.advanced{margin-top:14px;border-top:1px solid #e2e8f0;padding-top:12px}.advanced summary{cursor:pointer;color:#1d4ed8;font-size:13px;font-weight:800}.sync-note{margin-top:10px;font-size:13px;color:#64748b}.status{border-top:1px solid #e2e8f0;margin-top:14px;padding-top:12px;font-size:14px;color:#64748b}.error{color:var(--red)}.success{color:var(--green)}
      @media(max-width:980px){body{padding:12px}.board,.stats{grid-template-columns:1fr}.hero-head,.toolbar{display:block}.toolbar input{max-width:none;margin-top:8px}.bridge-grid{grid-template-columns:1fr}button,.button{width:100%}.icon-button{width:100%}}
    </style>
  </head>
  <body>
    <main>
      <nav>
        <a class="brand" href="/admin">LD-gpt-check Admin</a>
        <div class="nav-links"><a href="/admin">管理首页</a><a href="/admin/questions">题目管理</a><a href="/account">账号</a></div>
      </nav>
      <section class="hero">
        <div class="hero-head">
          <div>
            <span class="badge">Bridge Normalize</span>
            <h1>中转站归一管理</h1>
            <p>把待归一 API Base URL 拖到正确中转站。主页、图标和名称只在详情里轻量维护。</p>
          </div>
          <div class="button-row" style="margin-top:0">
            <button class="secondary" type="button" id="sync-bridges">同步数据库</button>
            <button class="secondary" type="button" id="new-bridge">新建中转站</button>
          </div>
        </div>
        <div class="sync-note" id="sync-note">加载时会自动同步 dashboard 提交里的中转站 URL。</div>
        <div class="stats" id="stats"></div>
      </section>
      <section id="app" class="board">
        <section class="panel"><p>正在检查登录状态...</p></section>
      </section>
    </main>

    <div class="drawer-backdrop" id="drawer-backdrop"></div>
    <aside class="drawer" id="drawer" aria-hidden="true"></aside>

    <script src="/admin/bridges/sortable.min.js"></script>
    <script>
      const app = document.querySelector("#app");
      const stats = document.querySelector("#stats");
      const syncNote = document.querySelector("#sync-note");
      const drawer = document.querySelector("#drawer");
      const drawerBackdrop = document.querySelector("#drawer-backdrop");
      let latestPayload = null;
      let activeBridge = null;
      let activeSuggestion = null;
      let aliasSortable = null;

      function escapeHTML(value) {
        return String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
      }
      function slugify(value) {
        return String(value || "").trim().toLowerCase().replace(/[^a-z0-9_.-]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 64);
      }
      function shortURL(value) {
        const text = String(value || "");
        return text.length > 58 ? `${text.slice(0, 42)}...${text.slice(-12)}` : text;
      }
      function renderIcon(url, label) {
        return url ? `<img class="icon" src="${escapeHTML(url)}" alt="" loading="lazy" />` : `<span class="icon icon-fallback">${escapeHTML((label || "?").slice(0, 1).toUpperCase())}</span>`;
      }
      function setStatus(message, type = "") {
        const status = document.querySelector("#status");
        if (!status) return;
        status.className = `status ${type}`.trim();
        status.textContent = message;
      }

      async function load() {
        const response = await fetch("/api/v1/admin/bridges", { credentials: "same-origin" });
        const payload = await response.json().catch(() => ({}));
        if (response.status === 401) {
          location.href = payload.login_url || "/auth/linuxdo/start?next=/admin/bridges";
          return;
        }
        if (!response.ok) {
          app.innerHTML = `<section class="panel"><p class="error">${escapeHTML(payload.error || "加载失败")}</p></section>`;
          return;
        }
        latestPayload = payload;
        renderSyncNote(payload.sync_result);
        renderStats(payload);
        renderBoard(payload);
      }

      function renderSyncNote(result) {
        if (!result) return;
        const changed = Number(result.created || 0) + Number(result.updated || 0) + Number(result.reconciled || 0);
        syncNote.textContent = `已同步数据库：扫描 ${Number(result.scanned || 0)}，新增 ${Number(result.created || 0)}，更新 ${Number(result.updated || 0)}，关联提交 ${Number(result.reconciled || 0)}。`;
        syncNote.className = changed ? "sync-note success" : "sync-note";
      }

      function renderStats(payload) {
        const bridges = payload.bridges || [];
        const activeURLs = bridges.flatMap((bridge) => bridge.base_urls || []).filter((item) => item.is_active).length;
        const suggestions = payload.suggestions || [];
        stats.innerHTML = `
          <article class="stat"><span>有效中转站</span><strong>${bridges.length}</strong></article>
          <article class="stat"><span>待归一 URL</span><strong>${suggestions.length}</strong></article>
          <article class="stat"><span>启用 API Base URL</span><strong>${activeURLs}</strong></article>
          <article class="stat"><span>数据库同步新增</span><strong>${Number(payload.sync_result?.created || 0)}</strong></article>
        `;
      }

      function renderBoard(payload) {
        app.innerHTML = `
          <section class="panel">
            <div class="toolbar">
              <h2>待归一 URL</h2>
              <input id="suggestion-filter" placeholder="筛选 URL / host" />
            </div>
            <div class="list" id="pending-list">${renderSuggestions(payload.suggestions || [])}</div>
          </section>
          <section class="panel">
            <div class="toolbar">
              <h2>中转站卡片</h2>
              <input id="bridge-filter" placeholder="筛选名称 / URL" />
            </div>
            <div class="bridge-grid" id="bridge-list">${renderBridges(payload.bridges || [])}</div>
          </section>
        `;
        bindBoardEvents();
        initSuggestionDrag();
        initBridgeDrops();
      }

      function renderSuggestions(items) {
        const term = String(document.querySelector("#suggestion-filter")?.value || "").toLowerCase();
        const list = items.filter((item) => [item.base_url, item.host, item.root_domain, item.submitted_name, item.detected_name, item.page_title].join(" ").toLowerCase().includes(term));
        if (!list.length) return `<div class="empty">没有待归一 URL。</div>`;
        return list.map((item) => {
          const name = item.detected_name || item.submitted_name || item.page_title || item.host || "待归一 URL";
          const candidate = (item.candidates || [])[0];
          return `
            <article class="card pending-card" data-suggestion-id="${escapeHTML(item.id)}">
              <header>
                <div class="title">${renderIcon(item.icon_url, name)}<div><h3>${escapeHTML(name)}</h3><code>${escapeHTML(shortURL(item.base_url))}</code></div></div>
                <span class="pill amber">${Number(item.confidence || 0)}%</span>
              </header>
              <div class="meta">
                <span>${escapeHTML(item.host || "-")}</span>
                <span>出现 ${Number(item.occurrence_count || 0)}</span>
                <span>用户 ${Number(item.user_count || 0)}</span>
              </div>
              ${candidate ? `<p>推荐：${escapeHTML(candidate.bridge_name)}，${Number(candidate.confidence || 0)}%</p>` : `<p>拖到右侧中转站，或新建中转站。</p>`}
              <div class="button-row">
                <button class="ghost" type="button" data-create-from="${escapeHTML(item.id)}">新建</button>
                <button class="secondary" type="button" data-ignore="${escapeHTML(item.id)}">忽略</button>
              </div>
            </article>
          `;
        }).join("");
      }

      function renderBridges(items) {
        const term = String(document.querySelector("#bridge-filter")?.value || "").toLowerCase();
        const list = items.filter((bridge) => [bridge.name, bridge.slug, bridge.root_domain, bridge.homepage_url, ...(bridge.base_urls || []).map((item) => item.base_url)].join(" ").toLowerCase().includes(term));
        if (!list.length) return `<div class="empty">还没有中转站。</div>`;
        return list.map((bridge) => {
          const activeURLs = (bridge.base_urls || []).filter((item) => item.is_active);
          const preview = activeURLs.slice(0, 3).map((item) => `<div><code>${escapeHTML(shortURL(item.base_url))}</code><span>${Number(item.usage_count || 0)}</span></div>`).join("");
          return `
            <article class="card bridge-card" data-bridge-id="${escapeHTML(bridge.id)}">
              <header>
                <div class="title">${renderIcon(bridge.icon_url, bridge.name)}<div><h3>${escapeHTML(bridge.name)}</h3><code>${escapeHTML(bridge.homepage_url || bridge.root_domain || bridge.slug)}</code></div></div>
                <span class="pill green">${activeURLs.length}</span>
              </header>
              <div class="meta">
                <span>使用 ${Number(bridge.usage_count || 0)}</span>
                <span>用户 ${Number(bridge.user_count || 0)}</span>
                <span>${escapeHTML(bridge.root_domain || "-")}</span>
              </div>
              <div class="url-preview">${preview || `<div><span>暂无 API Base URL</span></div>`}</div>
              <div class="drop-hint" data-bridge-drop="${escapeHTML(bridge.id)}">拖入待归一 URL 绑定到这里</div>
              <div class="button-row"><button type="button" data-open-bridge="${escapeHTML(bridge.id)}">详情</button></div>
            </article>
          `;
        }).join("");
      }

      function bindBoardEvents() {
        document.querySelector("#suggestion-filter").addEventListener("input", () => {
          document.querySelector("#pending-list").innerHTML = renderSuggestions(latestPayload?.suggestions || []);
          bindBoardEvents();
          initSuggestionDrag();
        }, { once: true });
        document.querySelector("#bridge-filter").addEventListener("input", () => {
          document.querySelector("#bridge-list").innerHTML = renderBridges(latestPayload?.bridges || []);
          bindBoardEvents();
          initBridgeDrops();
        }, { once: true });
        document.querySelectorAll("[data-open-bridge]").forEach((button) => button.addEventListener("click", () => openBridgeDrawer(button.dataset.openBridge)));
        document.querySelectorAll("[data-create-from]").forEach((button) => button.addEventListener("click", () => openSuggestionDrawer(button.dataset.createFrom)));
        document.querySelectorAll("[data-ignore]").forEach((button) => button.addEventListener("click", () => archiveSuggestion(button.dataset.ignore)));
      }

      function initSuggestionDrag() {
        const list = document.querySelector("#pending-list");
        if (!list || !window.Sortable) return;
        Sortable.create(list, {
          group: { name: "bridge-suggestions", pull: "clone", put: false },
          sort: false,
          animation: 150,
          draggable: ".pending-card",
          ghostClass: "is-dragging",
        });
      }

      function initBridgeDrops() {
        document.querySelectorAll("[data-bridge-drop]").forEach((drop) => {
          Sortable.create(drop, {
            group: { name: "bridge-suggestions", pull: false, put: true },
            sort: false,
            animation: 150,
            onAdd: async (event) => {
              const suggestionID = event.item.dataset.suggestionId;
              event.item.remove();
              await bindSuggestionToBridge(suggestionID, drop.dataset.bridgeDrop);
            },
          });
        });
      }

      function bridgeByID(id) {
        return (latestPayload?.bridges || []).find((item) => item.id === id);
      }
      function suggestionByID(id) {
        return (latestPayload?.suggestions || []).find((item) => item.id === id);
      }

      function openDrawer(html) {
        drawer.innerHTML = html;
        drawer.classList.add("is-open");
        drawerBackdrop.classList.add("is-open");
        drawer.setAttribute("aria-hidden", "false");
        drawer.querySelector("[data-close-drawer]")?.addEventListener("click", closeDrawer);
      }
      function closeDrawer() {
        drawer.classList.remove("is-open");
        drawerBackdrop.classList.remove("is-open");
        drawer.setAttribute("aria-hidden", "true");
        activeBridge = null;
        activeSuggestion = null;
      }
      drawerBackdrop.addEventListener("click", closeDrawer);
      document.querySelector("#new-bridge").addEventListener("click", () => openBridgeDrawer(""));
      document.querySelector("#sync-bridges").addEventListener("click", syncBridges);

      function openSuggestionDrawer(id) {
        const suggestion = suggestionByID(id);
        if (!suggestion) return;
        activeSuggestion = suggestion;
        openEditDrawer({
          title: "新建中转站",
          bridge: null,
          name: suggestion.detected_name || suggestion.submitted_name || suggestion.page_title || suggestion.host || "",
          homepage_url: suggestion.homepage_url || "",
          icon_url: suggestion.icon_url || "",
          description: suggestion.page_description || "",
          slug: "",
          canonical_url: suggestion.canonical_url || "",
          og_image_url: suggestion.og_image_url || "",
          status: "confirmed",
          base_urls: [suggestion.base_url].filter(Boolean),
        });
      }

      function openBridgeDrawer(id) {
        const bridge = id ? bridgeByID(id) : null;
        activeBridge = bridge || null;
        openEditDrawer({
          title: bridge ? "中转站详情" : "新建中转站",
          bridge,
          name: bridge?.name || "",
          homepage_url: bridge?.homepage_url || "",
          icon_url: bridge?.icon_url || "",
          description: bridge?.description || "",
          slug: bridge?.slug || "",
          canonical_url: bridge?.canonical_url || "",
          og_image_url: bridge?.og_image_url || "",
          status: bridge?.status || "confirmed",
          base_urls: (bridge?.base_urls || []).filter((item) => item.is_active).map((item) => item.base_url),
        });
      }

      function openEditDrawer({ title, bridge, name, homepage_url, icon_url, description, slug, canonical_url, og_image_url, status, base_urls }) {
        openDrawer(`
          <div class="drawer-head">
            <div><h2>${escapeHTML(title)}</h2><p>${bridge ? "维护名称、主页和 API Base URL。" : "只填最少信息即可保存。"}</p></div>
            <button class="secondary icon-button" type="button" data-close-drawer>×</button>
          </div>
          <form id="bridge-form">
            <div class="field"><span>名称</span><input name="name" value="${escapeHTML(name)}" required maxlength="128" /></div>
            <div class="field"><span>主页 URL</span><input name="homepage_url" value="${escapeHTML(homepage_url)}" maxlength="512" placeholder="https://example.com" /></div>
            <div class="field"><span>API Base URLs</span><textarea name="base_urls" spellcheck="false" placeholder="https://api.example.com/v1">${escapeHTML(base_urls.join("\\n"))}</textarea></div>
            <details class="advanced">
              <summary>高级配置</summary>
              <div class="field"><span>Slug</span><input name="slug" value="${escapeHTML(slug)}" maxlength="128" /></div>
              <div class="field"><span>状态</span><select name="status">
                <option value="confirmed"${status === "confirmed" ? " selected" : ""}>已确认</option>
                <option value="pending"${status === "pending" ? " selected" : ""}>待确认</option>
                <option value="hidden"${status === "hidden" ? " selected" : ""}>隐藏</option>
              </select></div>
              <div class="field"><span>Icon / Logo</span><input name="icon_url" value="${escapeHTML(icon_url)}" maxlength="98304" /></div>
              <div class="field"><span>描述</span><textarea name="description" maxlength="1024">${escapeHTML(description)}</textarea></div>
              <div class="field"><span>Canonical URL</span><input name="canonical_url" value="${escapeHTML(canonical_url)}" maxlength="512" /></div>
              <div class="field"><span>OG Image</span><input name="og_image_url" value="${escapeHTML(og_image_url)}" maxlength="512" /></div>
            </details>
            <div class="button-row">
              <button type="submit">保存</button>
              <button class="ghost" type="button" id="refresh-site">刷新站点信息</button>
            </div>
          </form>
          ${bridge ? renderAliasManager(bridge) : ""}
          <p class="status" id="status">就绪。</p>
        `);
        drawer.querySelector("#bridge-form").addEventListener("submit", saveBridge);
        drawer.querySelector("#refresh-site").addEventListener("click", refreshSiteInfo);
        drawer.querySelectorAll("[data-copy-url]").forEach((button) => button.addEventListener("click", () => copyText(button.dataset.copyUrl)));
        drawer.querySelectorAll("[data-disable-url]").forEach((button) => button.addEventListener("click", () => aliasAction(button.dataset.disableUrl, "disable")));
        initAliasSort();
      }

      function renderAliasManager(bridge) {
        const urls = bridge.base_urls || [];
        if (!urls.length) return `<section class="field"><span>已绑定 API Base URL</span><div class="empty">暂无 API Base URL。</div></section>`;
        return `
          <section class="field">
            <span>已绑定 API Base URL（拖拽排序，第一条为主）</span>
            <div id="alias-list" data-bridge-id="${escapeHTML(bridge.id)}">
              ${urls.map((item) => `
                <div class="alias-row" data-alias-id="${escapeHTML(item.id)}">
                  <span><b class="drag-handle">⋮⋮</b> <code>${escapeHTML(item.base_url)}</code><br><small>${escapeHTML(item.host || "")} · 使用 ${Number(item.usage_count || 0)}${item.is_active ? "" : " · 已禁用"}</small></span>
                  <span class="button-row" style="margin-top:0">
                    <button class="secondary icon-button" type="button" title="复制" data-copy-url="${escapeHTML(item.base_url)}">⧉</button>
                    ${item.is_active ? `<button class="danger icon-button" type="button" title="禁用" data-disable-url="${escapeHTML(item.id)}">−</button>` : ""}
                  </span>
                </div>
              `).join("")}
            </div>
          </section>
        `;
      }

      function initAliasSort() {
        const list = drawer.querySelector("#alias-list");
        if (!list || !window.Sortable) return;
        if (aliasSortable) aliasSortable.destroy();
        aliasSortable = Sortable.create(list, {
          animation: 150,
          handle: ".drag-handle",
          ghostClass: "sortable-ghost",
          onEnd: () => reorderAliases(list),
        });
      }

      async function reorderAliases(list) {
        const ids = [...list.querySelectorAll("[data-alias-id]")].map((item) => item.dataset.aliasId);
        const response = await fetch("/api/v1/admin/bridge-base-urls/reorder", {
          method: "POST",
          credentials: "same-origin",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ bridge_id: list.dataset.bridgeId, base_url_ids: ids }),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) return setStatus(payload.error || "排序保存失败", "error");
        setStatus("排序已保存。", "success");
        await load();
      }

      async function saveBridge(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const name = form.name.value.trim();
        const body = {
          suggestion_id: activeSuggestion?.id || "",
          name,
          slug: form.slug.value.trim() || activeBridge?.slug || slugify(name),
          icon_url: form.icon_url.value.trim() || activeBridge?.icon_url || activeSuggestion?.icon_url || "",
          homepage_url: form.homepage_url.value.trim(),
          description: form.description.value.trim() || activeBridge?.description || activeSuggestion?.page_description || "",
          status: form.status.value || "confirmed",
          canonical_url: form.canonical_url.value.trim(),
          og_image_url: form.og_image_url.value.trim(),
          primary_base_url: "",
          base_urls: form.base_urls.value.split(/\\n|,/).map((value) => value.trim()).filter(Boolean),
        };
        setStatus("正在保存...");
        const response = await fetch("/api/v1/admin/bridges", {
          method: "POST",
          credentials: "same-origin",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(body),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) return setStatus(payload.error || "保存失败", "error");
        setStatus("已保存。", "success");
        await load();
        closeDrawer();
      }

      async function refreshSiteInfo() {
        const form = drawer.querySelector("#bridge-form");
        const target = form.homepage_url.value.trim() || form.base_urls.value.split(/\\n|,/).map((value) => value.trim()).filter(Boolean)[0] || "";
        if (!target) return setStatus("先填写主页 URL 或 API Base URL。", "error");
        setStatus("正在读取站点信息...");
        const response = await fetch("/api/v1/admin/bridges/identify", {
          method: "POST",
          credentials: "same-origin",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ base_url: target, homepage_url: target, submitted_name: form.name.value.trim(), suggestion_id: activeSuggestion?.id || "" }),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) return setStatus(payload.error || "读取失败", "error");
        if (!form.name.value.trim()) form.name.value = payload.detected_name || payload.page_title || form.name.value;
        form.homepage_url.value = payload.homepage_url || form.homepage_url.value;
        form.icon_url.value = payload.icon_url || form.icon_url.value;
        form.description.value = payload.page_description || form.description.value;
        form.canonical_url.value = payload.canonical_url || form.canonical_url.value;
        form.og_image_url.value = payload.og_image_url || form.og_image_url.value;
        if (activeBridge) activeBridge.icon_url = payload.icon_url || activeBridge.icon_url;
        if (activeSuggestion) activeSuggestion.icon_url = payload.icon_url || activeSuggestion.icon_url;
        setStatus("站点信息已刷新，保存后生效。", "success");
      }

      async function syncBridges() {
        syncNote.textContent = "正在同步数据库...";
        syncNote.className = "sync-note";
        const response = await fetch("/api/v1/admin/bridges/sync", {
          method: "POST",
          credentials: "same-origin",
          headers: { "content-type": "application/json" },
          body: "{}",
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          syncNote.textContent = payload.error || "同步失败";
          syncNote.className = "sync-note error";
          return;
        }
        renderSyncNote(payload.sync_result);
        await load();
      }

      async function bindSuggestionToBridge(suggestionID, bridgeID) {
        const suggestion = suggestionByID(suggestionID);
        const bridge = bridgeByID(bridgeID);
        if (!suggestion || !bridge) return;
        const response = await fetch("/api/v1/admin/bridge-suggestions/bind", {
          method: "POST",
          credentials: "same-origin",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ suggestion_id: suggestionID, bridge_id: bridgeID }),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) return alert(payload.error || "绑定失败");
        await load();
      }

      async function archiveSuggestion(id) {
        const suggestion = suggestionByID(id);
        if (!suggestion) return;
        const response = await fetch("/api/v1/admin/bridge-suggestions/status", {
          method: "POST",
          credentials: "same-origin",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ id, status: "ignored" }),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) return alert(payload.error || "忽略失败");
        await load();
      }

      async function aliasAction(id, action) {
        const response = await fetch("/api/v1/admin/bridge-base-urls/action", {
          method: "POST",
          credentials: "same-origin",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ id, action }),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) return setStatus(payload.error || "操作失败", "error");
        setStatus("已更新。", "success");
        await load();
        if (activeBridge) openBridgeDrawer(activeBridge.id);
      }

      async function copyText(value) {
        try {
          await navigator.clipboard.writeText(value || "");
          setStatus("已复制。", "success");
        } catch {
          setStatus(`复制失败：${value}`, "error");
        }
      }

      load().catch((error) => {
        app.innerHTML = `<section class="panel"><p class="error">${escapeHTML(error.message || "加载失败")}</p></section>`;
      });
    </script>
  </body>
</html>
