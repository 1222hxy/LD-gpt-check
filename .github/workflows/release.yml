name: Release CLI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.suffix || matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: armv7
            archive: tar.gz
          - goos: linux
            goarch: arm
            goarm: "6"
            suffix: armv6
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Build package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
          ARCHIVE: ${{ matrix.archive }}
          SUFFIX: ${{ matrix.suffix || matrix.goarch }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          package_name="ld-gpt-check_${GOOS}_${SUFFIX}"
          executable="ld-gpt-check"
          if [ "${GOOS}" = "windows" ]; then
            executable="${executable}.exe"
          fi

          mkdir -p "dist/${package_name}"

          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${version}" \
            -o "dist/${package_name}/${executable}" \
            ./cmd/ld-gpt-check

          cp README.md README.en.md docs/commands.md ld-gpt-check.example.toml "dist/${package_name}/"

          (
            cd dist
            if [ "${ARCHIVE}" = "zip" ]; then
              zip -qr "${package_name}.zip" "${package_name}"
            else
              tar -czf "${package_name}.tar.gz" "${package_name}"
            fi
          )

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.suffix || matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          (
            cd dist
            find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS.txt
          )

      - name: Create release summary
        env:
          R2_PUBLIC_BASE_URL: ${{ vars.CLOUDFLARE_R2_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail

          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          cat > dist/RELEASE_NOTES.md <<EOF
          ## 直接下载

          不确定下载哪个的话，优先选择下面三个：

          - Windows Intel / AMD: [ld-gpt-check_windows_amd64.zip](${release_url}/ld-gpt-check_windows_amd64.zip)
          - Linux Intel / AMD: [ld-gpt-check_linux_amd64.tar.gz](${release_url}/ld-gpt-check_linux_amd64.tar.gz)
          - Linux ARM64: [ld-gpt-check_linux_arm64.tar.gz](${release_url}/ld-gpt-check_linux_arm64.tar.gz)

          macOS、Windows ARM64 和 Linux ARMv6/ARMv7 包在下方 Assets 中。

          ## 校验

          下载后可以用 \`SHA256SUMS.txt\` 校验压缩包。
          EOF

          if [ -n "${R2_PUBLIC_BASE_URL}" ]; then
            mirror_base="${R2_PUBLIC_BASE_URL%/}/ld-gpt-check/latest"
            cat >> dist/RELEASE_NOTES.md <<EOF

          ## Cloudflare R2 镜像

          如果 GitHub 下载慢，可以试试镜像：

          - Windows Intel / AMD: [ld-gpt-check_windows_amd64.zip](${mirror_base}/ld-gpt-check_windows_amd64.zip)
          - Linux Intel / AMD: [ld-gpt-check_linux_amd64.tar.gz](${mirror_base}/ld-gpt-check_linux_amd64.tar.gz)
          - Linux ARM64: [ld-gpt-check_linux_arm64.tar.gz](${mirror_base}/ld-gpt-check_linux_arm64.tar.gz)
          EOF
          fi

      - name: Create or update GitHub Release
        run: |
          set -euo pipefail

          flags=(--verify-tag --title "${RELEASE_TAG}" --generate-notes --notes-file dist/RELEASE_NOTES.md)
          if [[ "${RELEASE_TAG}" == *-* ]]; then
            flags+=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/*.tar.gz dist/*.zip dist/SHA256SUMS.txt --clobber
          else
            gh release create "${RELEASE_TAG}" dist/*.tar.gz dist/*.zip dist/SHA256SUMS.txt "${flags[@]}"
          fi

      - name: Optional mirror to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${R2_ACCOUNT_ID}" ] || [ -z "${R2_BUCKET}" ] || [ -z "${R2_ACCESS_KEY_ID}" ] || [ -z "${R2_SECRET_ACCESS_KEY}" ]; then
            echo "Cloudflare R2 secrets are not configured; skipping mirror."
            exit 0
          fi

          if ! command -v aws >/dev/null 2>&1; then
            python -m pip install --user awscli
            echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
            export PATH="${HOME}/.local/bin:${PATH}"
          fi

          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          version="${RELEASE_TAG#v}"

          AWS_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}" \
          AWS_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}" \
          AWS_DEFAULT_REGION="auto" \
            aws s3 sync dist/ "s3://${R2_BUCKET}/ld-gpt-check/${version}/" \
              --endpoint-url "${endpoint}" \
              --exclude "*" \
              --include "*.tar.gz" \
              --include "*.zip" \
              --include "SHA256SUMS.txt"

          AWS_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}" \
          AWS_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}" \
          AWS_DEFAULT_REGION="auto" \
            aws s3 sync dist/ "s3://${R2_BUCKET}/ld-gpt-check/latest/" \
              --endpoint-url "${endpoint}" \
              --delete \
              --exclude "*" \
              --include "*.tar.gz" \
              --include "*.zip" \
              --include "SHA256SUMS.txt"
