name: Release CLI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: false

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.suffix || matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: armv7
          - goos: linux
            goarch: arm
            goarm: "6"
            suffix: armv6

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: false

      - name: Build package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
          SUFFIX: ${{ matrix.suffix || matrix.goarch }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          asset_name="ld-gpt-check_${GOOS}_${SUFFIX}"
          if [ "${GOOS}" = "windows" ]; then
            asset_name="${asset_name}.exe"
          fi

          mkdir -p dist
          commit="$(git rev-parse --short=12 HEAD)"
          commit_date="$(git log -1 --format=%cI)"
          recent_commits="$(git log -5 --pretty=format:'%h %s' | paste -sd '|' -)"

          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${version} -X main.assetSuffix=${SUFFIX} -X main.gitCommit=${commit} -X main.gitCommitDate=${commit_date} -X 'main.recentCommits=${recent_commits}'" \
            -o "dist/${asset_name}" \
            ./cmd/ld-gpt-check

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.suffix || matrix.goarch }}
          path: dist/ld-gpt-check_*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          (
            cd dist
            find . -maxdepth 1 -type f -name 'ld-gpt-check_*' -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS.txt
          )

      - name: Create release summary
        env:
          R2_PUBLIC_BASE_URL: ${{ vars.CLOUDFLARE_R2_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail

          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          cat > dist/RELEASE_NOTES.md <<EOF
          ## 直接下载

          不确定下载哪个的话，优先选择下面三个：

          - Windows Intel / AMD: [ld-gpt-check_windows_amd64.exe](${release_url}/ld-gpt-check_windows_amd64.exe)
          - Linux Intel / AMD: [ld-gpt-check_linux_amd64](${release_url}/ld-gpt-check_linux_amd64)
          - Linux ARM64: [ld-gpt-check_linux_arm64](${release_url}/ld-gpt-check_linux_arm64)

          macOS、Windows ARM64 和 Linux ARMv6/ARMv7 二进制文件在下方 Assets 中。

          ## 校验

          下载后可以用 \`SHA256SUMS.txt\` 校验文件。
          EOF

          if [ -n "${R2_PUBLIC_BASE_URL}" ]; then
            mirror_base="${R2_PUBLIC_BASE_URL%/}/ld-gpt-check/latest"
            cat >> dist/RELEASE_NOTES.md <<EOF

          ## Cloudflare R2 镜像

          如果 GitHub 下载慢，可以试试镜像：

          - Windows Intel / AMD: [ld-gpt-check_windows_amd64.exe](${mirror_base}/ld-gpt-check_windows_amd64.exe)
          - Linux Intel / AMD: [ld-gpt-check_linux_amd64](${mirror_base}/ld-gpt-check_linux_amd64)
          - Linux ARM64: [ld-gpt-check_linux_arm64](${mirror_base}/ld-gpt-check_linux_arm64)
          EOF
          fi

      - name: Create or update GitHub Release
        run: |
          set -euo pipefail

          flags=(--verify-tag --title "${RELEASE_TAG}" --generate-notes --notes-file dist/RELEASE_NOTES.md)
          if [[ "${RELEASE_TAG}" == *-* ]]; then
            flags+=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            for legacy_asset in \
              ld-gpt-check_windows_amd64.zip \
              ld-gpt-check_windows_arm64.zip \
              ld-gpt-check_darwin_amd64.tar.gz \
              ld-gpt-check_darwin_arm64.tar.gz \
              ld-gpt-check_linux_amd64.tar.gz \
              ld-gpt-check_linux_arm64.tar.gz \
              ld-gpt-check_linux_armv7.tar.gz \
              ld-gpt-check_linux_armv6.tar.gz
            do
              gh release delete-asset "${RELEASE_TAG}" "${legacy_asset}" -y >/dev/null 2>&1 || true
            done
            gh release upload "${RELEASE_TAG}" dist/ld-gpt-check_* dist/SHA256SUMS.txt --clobber
          else
            gh release create "${RELEASE_TAG}" dist/ld-gpt-check_* dist/SHA256SUMS.txt "${flags[@]}"
          fi

      - name: Optional mirror to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${R2_ACCOUNT_ID}" ] || [ -z "${R2_BUCKET}" ] || [ -z "${R2_ACCESS_KEY_ID}" ] || [ -z "${R2_SECRET_ACCESS_KEY}" ]; then
            echo "Cloudflare R2 secrets are not configured; skipping mirror."
            exit 0
          fi

          if ! command -v aws >/dev/null 2>&1; then
            python -m pip install --user awscli
            echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
            export PATH="${HOME}/.local/bin:${PATH}"
          fi

          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          version="${RELEASE_TAG#v}"

          AWS_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}" \
          AWS_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}" \
          AWS_DEFAULT_REGION="auto" \
            aws s3 sync dist/ "s3://${R2_BUCKET}/ld-gpt-check/${version}/" \
              --endpoint-url "${endpoint}" \
              --exclude "*" \
              --include "ld-gpt-check_*" \
              --include "SHA256SUMS.txt"

          for legacy_asset in \
            ld-gpt-check_windows_amd64.zip \
            ld-gpt-check_windows_arm64.zip \
            ld-gpt-check_darwin_amd64.tar.gz \
            ld-gpt-check_darwin_arm64.tar.gz \
            ld-gpt-check_linux_amd64.tar.gz \
            ld-gpt-check_linux_arm64.tar.gz \
            ld-gpt-check_linux_armv7.tar.gz \
            ld-gpt-check_linux_armv6.tar.gz
          do
            AWS_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}" \
            AWS_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}" \
            AWS_DEFAULT_REGION="auto" \
              aws s3 rm "s3://${R2_BUCKET}/ld-gpt-check/${version}/${legacy_asset}" \
                --endpoint-url "${endpoint}" >/dev/null 2>&1 || true
          done

          AWS_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}" \
          AWS_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}" \
          AWS_DEFAULT_REGION="auto" \
            aws s3 sync dist/ "s3://${R2_BUCKET}/ld-gpt-check/latest/" \
              --endpoint-url "${endpoint}" \
              --delete \
              --exclude "*" \
              --include "ld-gpt-check_*" \
              --include "SHA256SUMS.txt"

          for legacy_asset in \
            ld-gpt-check_windows_amd64.zip \
            ld-gpt-check_windows_arm64.zip \
            ld-gpt-check_darwin_amd64.tar.gz \
            ld-gpt-check_darwin_arm64.tar.gz \
            ld-gpt-check_linux_amd64.tar.gz \
            ld-gpt-check_linux_arm64.tar.gz \
            ld-gpt-check_linux_armv7.tar.gz \
            ld-gpt-check_linux_armv6.tar.gz
          do
            AWS_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}" \
            AWS_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}" \
            AWS_DEFAULT_REGION="auto" \
              aws s3 rm "s3://${R2_BUCKET}/ld-gpt-check/latest/${legacy_asset}" \
                --endpoint-url "${endpoint}" >/dev/null 2>&1 || true
          done
