name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string for manual builds, for example v0.1.0"
        required: false
        default: "dev"

permissions:
  contents: write

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build archives
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          fi
          if [[ -z "${version}" ]]; then
            version="dev"
          fi

          mkdir -p dist
          targets=(
            "linux/amd64"
            "linux/arm64"
            "linux/arm/6"
            "linux/arm/7"
            "linux/386"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
            "windows/386"
            "freebsd/amd64"
            "freebsd/arm64"
          )

          for target in "${targets[@]}"; do
            IFS=/ read -r goos goarch goarm <<< "${target}"
            name="ld-gpt-check_${version}_${goos}_${goarch}"
            if [[ -n "${goarm:-}" ]]; then
              name="${name}v${goarm}"
            fi

            out_dir="dist/${name}"
            mkdir -p "${out_dir}"
            bin="ld-gpt-check"
            if [[ "${goos}" == "windows" ]]; then
              bin="ld-gpt-check.exe"
            fi

            echo "Building ${name}"
            build_env=(CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}")
            if [[ -n "${goarm:-}" ]]; then
              build_env+=(GOARM="${goarm}")
            fi
            env "${build_env[@]}" go build -trimpath \
              -ldflags="-s -w -X main.version=${version}" \
              -o "${out_dir}/${bin}" ./cmd/ld-gpt-check

            cp README.md README.en.md ld-gpt-check.example.toml "${out_dir}/"

            if [[ "${goos}" == "windows" ]]; then
              (cd dist && zip -qr "${name}.zip" "${name}")
            else
              (cd dist && tar -czf "${name}.tar.gz" "${name}")
            fi
            rm -rf "${out_dir}"
          done

          (cd dist && sha256sum * > checksums.txt)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ld-gpt-check-binaries
          path: dist/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
